    <link rel="stylesheet" href="sample design/style.css">
    <style>
        :root {
            --primary-color: #000000;
            --bg-color: #f4f4f4;
            --card-bg: #ffffff;
            --accent-yellow: #FFD100;
            --accent-blue: #00E0FF;
            --accent-pink: #FF007A;
            --accent-green: #00FF94;
            --shadow-color: #000000;
            --text-color: #000000;
            --brutal-border: 4px solid #000000;
            --brutal-shadow: 6px 6px 0px #000000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
        }

        .panel {
            background: var(--card-bg);
            border: var(--brutal-border);
            padding: 30px;
            box-shadow: var(--brutal-shadow);
        }

        h1 {
            color: var(--text-color);
            margin-bottom: 18px;
            text-align: center;
            font-size: 2rem;
            text-transform: uppercase;
            font-weight: 900;
        }

        .nav-link {
            color: #000;
            text-decoration: none;
            font-size: 0.95rem;
            margin-bottom: 20px;
            display: inline-block;
            font-weight: 700;
            text-transform: uppercase;
        }

        .nav-link:hover {
            color: var(--accent-pink);
        }

        .password-input {
            width: 100%;
            padding: 12px 14px;
            margin-bottom: 20px;
            border: 3px solid #000;
            background: #fff;
            color: #000;
            font-family: 'Outfit', sans-serif;
            box-shadow: 4px 4px 0px var(--shadow-color);
        }

        .btn {
            padding: 12px 24px;
            border: 3px solid #000;
            background: var(--accent-yellow);
            color: #000;
            font-size: 0.9rem;
            letter-spacing: 0.06em;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 800;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px var(--shadow-color);
        }

        .btn:hover {
            transform: translate(-2px, -2px);
            box-shadow: 6px 6px 0px var(--shadow-color);
        }

        .btn-primary {
            background: var(--accent-yellow);
        }

        .section {
            margin-bottom: 24px;
            padding: 16px;
            border: 3px solid #000;
            background: #fff;
            box-shadow: 4px 4px 0px var(--shadow-color);
        }

        .section h3 {
            color: var(--text-color);
            margin-bottom: 12px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .log-entry {
            padding: 8px;
            margin: 6px 0;
            border-left: 4px solid #000;
            background: #f7f7f7;
            color: #333;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .log-entry.error {
            border-left-color: var(--accent-pink);
            background: #fff2f7;
        }

        .toggle-btn {
            background: var(--accent-green);
            border-color: #000;
            color: #000;
        }

        .toggle-btn.blocked {
            background: var(--accent-pink);
            color: #fff;
        }

        .system-info {
            color: #333;
            font-size: 0.95rem;
            line-height: 1.6;
            font-weight: 600;
        }
    </style>

<body>
    <div class="container">
        <div class="panel">
            <h1>Master / Developer Panel</h1>
            <a href="index.html" class="nav-link">← Back to Website</a>
            
            <div id="masterPasswordSection">
                <input type="password" id="masterPassword" class="password-input" placeholder="Enter Master Password">
                <button class="btn btn-primary" onclick="verifyMasterPassword()">Unlock Panel</button>
            </div>
            
            <div id="masterContent" style="display:none;">
                <div class="section">
                    <h3>Website Status Control</h3>
                    <button class="btn toggle-btn" id="blockToggleBtn" onclick="toggleWebsiteBlock()">Website Active</button>
                </div>
                
                <div class="section">
                    <h3>Diagnostic Logs</h3>
                    <div id="logContainer"></div>
                    <button class="btn" onclick="clearLogs()" style="margin-top:10px;">Clear Logs</button>
                </div>
                
                <div class="section">
                    <h3>System Info</h3>
                    <p id="systemInfo" class="system-info"></p>
                    <p id="productCount" class="system-info"></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let logs = [];
        let MASTER_PASSWORD = "admin123"; // Change this to your own secure password!

        function verifyMasterPassword() {
            const entered = document.getElementById('masterPassword').value;
            if (entered === MASTER_PASSWORD) {
                document.getElementById('masterPasswordSection').style.display = 'none';
                document.getElementById('masterContent').style.display = 'block';
                loadMasterPanelData();
            } else {
                alert('Incorrect password!');
            }
        }

        function loadMasterPanelData() {
            updateSystemInfo();
            updateWebsiteToggle();
            loadLogs();
        }

        function updateSystemInfo() {
            document.getElementById('systemInfo').innerText = `Browser: ${navigator.userAgent}\nDate: ${new Date().toLocaleString()}`;
            
            // Load products from localStorage to count them
            const savedProducts = localStorage.getItem('viyaraProducts');
            const products = savedProducts ? JSON.parse(savedProducts) : [];
            document.getElementById('productCount').innerText = `Total Products: ${products.length}`;
        }

        function updateWebsiteToggle() {
            const isBlocked = localStorage.getItem('siteBlocked') === 'true';
            const btn = document.getElementById('blockToggleBtn');
            if (isBlocked) {
                btn.classList.add('blocked');
                btn.innerText = 'Website Blocked (Click to Unblock)';
            } else {
                btn.classList.remove('blocked');
                btn.innerText = 'Website Active (Click to Block)';
            }
        }

        function toggleWebsiteBlock() {
            const isBlocked = localStorage.getItem('siteBlocked') === 'true';
            localStorage.setItem('siteBlocked', (!isBlocked).toString());
            updateWebsiteToggle();
        }

        function loadLogs() {
            const saved = localStorage.getItem('masterLogs');
            if (saved) logs = JSON.parse(saved);
            renderLogs();
        }

        function renderLogs() {
            const container = document.getElementById('logContainer');
            if (!logs.length) {
                container.innerHTML = '<p style="color: #888;">No logs yet</p>';
                return;
            }
            container.innerHTML = logs.map(log => `
                <div class="log-entry ${log.type === 'error' ? 'error' : ''}">
                    [${log.time}] ${log.message}
                </div>
            `).join('');
        }

        function clearLogs() {
            logs = [];
            localStorage.setItem('masterLogs', JSON.stringify(logs));
            renderLogs();
        }

        // Load initial data
        window.onload = function() {
            loadLogs();
        };
    </script>
